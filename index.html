    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap');

    :root {
      --bg: #fbfaf6;
      --surface: #f4f1e9;
      --ink: #14231c;
      --muted: #627069;
      --border: rgba(20, 35, 28, .12);
      --chip: #eef1ec;
      --radius-xl: 32px;
      --radius-lg: 24px;
      --shadow: 0 24px 70px rgba(37, 52, 44, .08);
      --brand: #3b5998;
      --brand-soft: #aab7d4;
      --white: #fff;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      background: var(--bg);
      font-family: "DM Sans", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }
    h1, h2, h3, p { margin-top: 0; }
    :focus-visible { outline: 3px solid rgba(59, 89, 152, .32); outline-offset: 4px; }

    .shell { width: min(1180px, calc(100% - 48px)); margin: 0 auto; }
    .skip-link {
      position: fixed;
      z-index: 100;
      top: 12px;
      left: 12px;
      padding: 12px 16px;
      border-radius: 999px;
      color: var(--white);
      background: var(--brand);
      transform: translateY(-160%);
    }
    .skip-link:focus { transform: none; }

    .nav-wrap {
      position: fixed;
      z-index: 20;
      top: 0;
      right: 0;
      left: 0;
      padding: 18px 0;
      transition: padding .25s ease;
    }
    .nav-wrap.scrolled { padding: 10px 0; }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 66px;
      padding: 0 10px 0 18px;
      border: 1px solid rgba(255, 255, 255, .8);
      border-radius: 18px;
      background: rgba(251, 250, 246, .78);
      box-shadow: 0 12px 34px rgba(30, 43, 35, .05);
      backdrop-filter: blur(18px);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      min-width: 190px;
      letter-spacing: -.04em;
    }
    .brand-logo { width: 38px; height: 38px; object-fit: contain; }
    .brand-text strong { display: block; font-size: 16px; font-weight: 700; line-height: 1.05; }
    .brand-text span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
    .nav-links { display: flex; align-items: center; gap: 24px; color: #48564f; font-size: 14px; font-weight: 500; }
    .nav-links a { padding: 12px 0; transition: color .2s ease; }
    .nav-links a:hover { color: var(--ink); }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
